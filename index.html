<h1>Install Auto‑Fill Bookmarklet</h1>

<p>Drag the button below to your bookmarks bar:</p>

<a class="button"
href="javascript:(function(){const t='https://www.new-innov.com/EvaluationForms/EvaluationFormsHost.aspx';if(!location.href.startsWith(t)){alert('Redirecting to evaluation page. After login/load, click bookmark again.');location.href=t;return;}console.clear();const O={0:'Never',1:'Rarely',2:'Sometimes',3:'Often',4:'Consistently',5:'Always'};let p=Array.from(document.querySelectorAll('.mi-detail-item')).find(e=>/PL-\d/.test(e.textContent)),d=p?parseInt(p.textContent.match(/PL-(\d)/)[1]):null;if(d===null){console.error('PL not found');return;}let i=prompt('Detected PL-'+d+'\nEnter score (0–5):',d),c=i!==null&&i!==''?Math.max(0,Math.min(5,parseInt(i))):d,b=document.querySelectorAll('.rating-scale-content'),f=0;b.forEach(x=>{let s=x.querySelectorAll('.slick-slide'),t=s[c];if(!t)return;let r=t.querySelector(\"input[type='radio']\");r&&(r.checked=true,r.dispatchEvent(new Event('change',{bubbles:true})),r.dispatchEvent(new Event('click',{bubbles:true})),f++)});let e=document.querySelector('.mi-evaluator');if(!e){console.warn('mi-evaluator not found');return;}let ex=document.getElementById('auto-fill-status');ex&&ex.remove();let st=document.createElement('div');st.id='auto-fill-status';st.textContent='Auto-filled '+f+' with \"'+O[c]+'\" (PL-'+d+')';st.style.color='red';st.style.fontWeight='bold';st.style.marginTop='8px';e.appendChild(st);})();">
📌 Install Bookmarklet
</a>

<p>💡 Drag the button — do NOT click it.</p>

</body>
